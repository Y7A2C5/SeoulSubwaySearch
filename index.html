<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>首爾地鐵迷路小幫手</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #666;
    --border: #e0e0e0;
  }

  body {
    font-family: 'Segoe UI', 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .app {
    min-height: 100vh;
  }

  .panel {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    background: var(--card);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
  }

  .app-title {
    font-size: 18px;
    font-weight: 600;
  }

  .app-sub {
    font-size: 12px;
    color: var(--muted);
  }

  .panel-body {
    flex: 1;
    padding: 16px 20px;
  }

  .go-btn {
    width: 100%;
    height: 48px;
    background: #2052A0;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    margin-top: 20px;
  }

</style>
</head>

<body>

<div class="app">
  <div class="panel">
    <div class="panel-header">
      <div class="app-title">🚇 首爾地鐵迷路小幫手</div>
      <div class="app-sub">Seoul Metro Direction Finder</div>
    </div>

    <div class="panel-body">
      <p>這是已修正版本（灰色區塊已移除）</p>

      <button class="go-btn">判斷方向 →</button>
    </div>
  </div>
</div>

</body>
</html>
